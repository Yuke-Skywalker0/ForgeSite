    <!-- ── Anti-flash tema: legge cookie PRIMA del render React ── -->
    <!-- Questo script inline è intenzionale e necessario: deve essere
         sincrono nel <head> per impostare la classe CSS sul <html>
         prima che il browser dipinga qualsiasi pixel, eliminando
         il flash da chiaro a scuro (o viceversa) al caricamento. -->
    <script>
      (function() {
        try {
          var m = document.cookie.match(/forgesite_theme=([^;]+)/);
          var t = m && m[1] === 'dark' ? 'dark' : 'light';
          document.documentElement.className = t;
        } catch(e) {
          document.documentElement.className = 'light';
        }
      })();
    </script>
